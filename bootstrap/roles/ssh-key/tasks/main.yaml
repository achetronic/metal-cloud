# Authorize autogenerated SSH keys
- name: Generate an OpenSSH keypair
  register: sshkeypair
  delegate_to: "localhost"
  delegate_facts: true
  community.crypto.openssh_keypair:
    path: "{{ playbook_dir }}/{{ ssh_key_path }}/id_ed25519_{{ random }}"
    type: ed25519
    
- name: Show generated public key that will be authorized
  ansible.builtin.debug:
    msg: "{{ sshkeypair.public_key }}"
    
- name: Authorize generated key, removing previous ones
  ansible.posix.authorized_key:
    user: "{{ ansible_facts['user_id'] }}"
    key: "{{ sshkeypair.public_key }}"
    state: present
    exclusive: yes
    
# Authorize external SSH keys
- name: Find external SSH keys
  register: external_ssh_keys
  delegate_to: "localhost"
  delegate_facts: true
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/{{ external_ssh_keys_path }}"
    patterns: "*.pub"
    size: -1m

- name: Authorize external keys
  loop: "{{ external_ssh_keys.files | map(attribute='path') | list }}"
  ansible.posix.authorized_key:
    user: "{{ ansible_facts['user_id'] }}"
    key: "{{ lookup('file', item) }}"
    state: present
